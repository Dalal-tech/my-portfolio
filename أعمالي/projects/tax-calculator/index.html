<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حاسبة ضريبة القيمة المضافة 15%</title>
  <style>
    :root { --green: #1A3B2B; --white: #FFFFFF; --soft: #f3f7f5; --border: #d8e3dd; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Tahoma", "Arial", sans-serif; background: linear-gradient(135deg, #e7efeb, #f7fbf9); color: var(--green); min-height: 100vh; display: grid; place-items: center; padding: 20px; }
    .card { width: min(520px, 100%); background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 22px; box-shadow: 0 10px 28px rgba(26, 59, 43, 0.12); }
    h1 { margin: 0 0 8px; font-size: clamp(1.3rem, 3vw, 1.8rem); }
    .hint { margin: 0 0 18px; color: #355847; background: var(--soft); border-right: 4px solid var(--green); padding: 10px 12px; border-radius: 10px; font-size: 0.95rem; }
    label { font-weight: 700; display: block; margin-bottom: 8px; }
    input { width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: 12px; font-size: 1rem; outline: none; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    button { border: 1px solid var(--green); border-radius: 999px; padding: 10px 16px; font-weight: 700; cursor: pointer; }
    .btn-calc { background: var(--green); color: var(--white); }
    .btn-clear { background: var(--white); color: var(--green); }
    .btn-copy { background: #eef4f1; color: var(--green); }
    .results { margin-top: 18px; border-top: 1px dashed var(--border); padding-top: 14px; display: grid; gap: 8px; }
    .row { background: var(--soft); border-radius: 10px; padding: 10px 12px; display: flex; justify-content: space-between; gap: 12px; font-weight: 700; }
  </style>
</head>
<body>
  <main class="card">
    <h1>حاسبة ضريبة القيمة المضافة (15%)</h1>
    <p class="hint">الضريبة في السعودية 15%</p>
    <label for="amount">أدخل المبلغ بدون ضريبة (﷼)</label>
    <input id="amount" type="number" min="0" step="0.01" placeholder="مثال: 100">
    <label for="totalInput" style="margin-top: 12px;">أو أدخل الإجمالي شامل الضريبة (﷼)</label>
    <input id="totalInput" type="number" min="0" step="0.01" placeholder="مثال: 115">
    <div class="actions">
      <button class="btn-calc" id="calcBtn" type="button">احسب الضريبة والإجمالي</button>
      <button class="btn-calc" id="reverseBtn" type="button">احسب قبل الضريبة</button>
      <button class="btn-clear" id="clearBtn" type="button">مسح</button>
      <button class="btn-copy" id="copyBtn" type="button">نسخ النتيجة</button>
    </div>
    <section class="results" aria-live="polite">
      <div class="row"><span>المبلغ الأصلي:</span><span id="baseValue">٠.٠٠ ﷼</span></div>
      <div class="row"><span>قيمة الضريبة (15%):</span><span id="vatValue">٠.٠٠ ﷼</span></div>
      <div class="row"><span>الإجمالي مع الضريبة:</span><span id="totalValue">٠.٠٠ ﷼</span></div>
    </section>
  </main>
  <script>
    const VAT_RATE = 0.15;
    const amountInput = document.getElementById("amount");
    const totalInput = document.getElementById("totalInput");
    const calcBtn = document.getElementById("calcBtn");
    const reverseBtn = document.getElementById("reverseBtn");
    const clearBtn = document.getElementById("clearBtn");
    const copyBtn = document.getElementById("copyBtn");
    const baseValue = document.getElementById("baseValue");
    const vatValue = document.getElementById("vatValue");
    const totalValue = document.getElementById("totalValue");
    const saFormatter = new Intl.NumberFormat("ar-SA", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    function formatSar(value) { return saFormatter.format(value) + " ﷼"; }
    function calculateVat() { const amount = Number(amountInput.value); if (!Number.isFinite(amount) || amount < 0) return; const vat = amount * VAT_RATE; const total = amount + vat; baseValue.textContent = formatSar(amount); vatValue.textContent = formatSar(vat); totalValue.textContent = formatSar(total); }
    function calculateFromTotal() { const total = Number(totalInput.value); if (!Number.isFinite(total) || total < 0) return; const base = total / (1 + VAT_RATE); const vat = total - base; baseValue.textContent = formatSar(base); vatValue.textContent = formatSar(vat); totalValue.textContent = formatSar(total); }
    async function copyResult() { const text = ["نتيجة حاسبة ضريبة القيمة المضافة:", `المبلغ الأصلي: ${baseValue.textContent}`, `قيمة الضريبة (15%): ${vatValue.textContent}`, `الإجمالي مع الضريبة: ${totalValue.textContent}`].join("\n"); try { await navigator.clipboard.writeText(text); } catch (error) {} }
    function clearAll() { amountInput.value = ""; totalInput.value = ""; baseValue.textContent = "٠.٠٠ ﷼"; vatValue.textContent = "٠.٠٠ ﷼"; totalValue.textContent = "٠.٠٠ ﷼"; }
    calcBtn.addEventListener("click", calculateVat); reverseBtn.addEventListener("click", calculateFromTotal); clearBtn.addEventListener("click", clearAll); copyBtn.addEventListener("click", copyResult);
  </script>
</body>
</html>
